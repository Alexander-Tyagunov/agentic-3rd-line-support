<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 200" width="1100" height="200" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6d7cff"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#151a2e"/>
      <stop offset="1" stop-color="#0f1220"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1100" height="200" rx="18" fill="url(#bg)"/>

  <!-- connector line -->
  <line x1="80" y1="112" x2="1020" y2="112" stroke="#2c3555" stroke-width="2"/>

  <!-- flowing packets -->
  <g fill="#6d7cff">
    <circle r="4" cy="112" filter="url(#glow)">
      <animate attributeName="cx" values="80;1020" dur="3.4s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="3.4s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" cy="112" fill="#8b5cf6" filter="url(#glow)">
      <animate attributeName="cx" values="80;1020" dur="3.4s" begin="1.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="3.4s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" cy="112" fill="#34d399" filter="url(#glow)">
      <animate attributeName="cx" values="80;1020" dur="3.4s" begin="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="3.4s" begin="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- title -->
  <text x="550" y="34" text-anchor="middle" fill="#9aa3c7" font-size="13" letter-spacing="3">D E T E C T &#8594; T R I A G E &#8594; T I C K E T &#8594; F I X</text>

  <!-- nodes -->
  <g text-anchor="middle">
    <!-- 1 logs -->
    <g>
      <rect x="20" y="80" width="130" height="64" rx="14" fill="#1b2138" stroke="url(#g)" stroke-width="1.5"/>
      <text x="85" y="108" fill="#e7eaf6" font-size="13" font-weight="700">Synthetic</text>
      <text x="85" y="126" fill="#9aa3c7" font-size="10.5">logs (Rust)</text>
    </g>
    <!-- 2 monitoring -->
    <g>
      <rect x="205" y="80" width="130" height="64" rx="14" fill="#1b2138" stroke="url(#g)" stroke-width="1.5"/>
      <text x="270" y="108" fill="#e7eaf6" font-size="13" font-weight="700">Monitoring</text>
      <text x="270" y="126" fill="#9aa3c7" font-size="10.5">Gemini 3</text>
    </g>
    <!-- 3 triage -->
    <g>
      <rect x="390" y="80" width="130" height="64" rx="14" fill="#1b2138" stroke="url(#g)" stroke-width="1.5"/>
      <text x="455" y="108" fill="#e7eaf6" font-size="13" font-weight="700">Triage</text>
      <text x="455" y="126" fill="#9aa3c7" font-size="10.5">Gemini 3 · dedup</text>
    </g>
    <!-- 4 console + gate -->
    <g>
      <rect x="575" y="80" width="130" height="64" rx="14" fill="#1b2138" stroke="#fbbf24" stroke-width="1.8"/>
      <text x="640" y="108" fill="#e7eaf6" font-size="13" font-weight="700">Console</text>
      <text x="640" y="126" fill="#fbbf24" font-size="10.5">human gate</text>
      <circle cx="640" cy="70" r="5" fill="#fbbf24">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/>
      </circle>
    </g>
    <!-- 5 coding -->
    <g>
      <rect x="760" y="80" width="130" height="64" rx="14" fill="#1b2138" stroke="url(#g)" stroke-width="1.5"/>
      <text x="825" y="108" fill="#e7eaf6" font-size="13" font-weight="700">Coding agent</text>
      <text x="825" y="126" fill="#9aa3c7" font-size="10.5">Gemini · PR</text>
    </g>
    <!-- 6 merge + gate -->
    <g>
      <rect x="945" y="80" width="130" height="64" rx="14" fill="#1b2138" stroke="#34d399" stroke-width="1.8"/>
      <text x="1010" y="108" fill="#e7eaf6" font-size="13" font-weight="700">Merge</text>
      <text x="1010" y="126" fill="#34d399" font-size="10.5">human review</text>
      <circle cx="1010" cy="70" r="5" fill="#34d399">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" begin="0.9s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
</svg>
