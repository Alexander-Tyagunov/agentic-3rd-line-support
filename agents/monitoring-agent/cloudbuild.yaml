# Build the monitoring-agent image with the REPO ROOT as build context (so
# grounding/ is bundled). Submit from the repo root:
#   gcloud builds submit . --config=agents/monitoring-agent/cloudbuild.yaml \
#     --substitutions=_IMAGE=REGION-docker.pkg.dev/PROJECT/REPO/monitoring-agent:latest
steps:
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-f", "agents/monitoring-agent/Dockerfile", "-t", "${_IMAGE}", "."]
images: ["${_IMAGE}"]
options:
  logging: CLOUD_LOGGING_ONLY
