# Coding agent: implements an `agent-bug` issue and opens a PR, using Gemini via
# the Gemini CLI GitHub Action. Auth to Vertex AI is via Workload Identity
# Federation (no keys). The human gate is the PR review — this never merges.
#
# Required repo secrets (from `terraform output`):
#   GCP_WORKLOAD_IDENTITY_PROVIDER  -> github_workload_identity_provider
#   GCP_SERVICE_ACCOUNT             -> github_actions_service_account
#   GCP_PROJECT_ID                  -> your project id (e.g. agentic-3rd-line-support)

name: Coding Agent (Gemini)

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write # required for Workload Identity Federation

concurrency:
  group: coding-agent-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  gemini:
    # Run for issues labeled `agent-bug`, or a human `@gemini-cli` mention.
    if: |
      (github.event_name == 'issues' && contains(join(github.event.issue.labels.*.name, ','), 'agent-bug')) ||
      (github.event_name == 'issue_comment' && github.event.comment.user.type != 'Bot' && contains(github.event.comment.body, '@gemini-cli'))
    runs-on: ubuntu-latest
    timeout-minutes: 20 # cost guard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gemini CLI
        uses: google-github-actions/run-gemini-cli@v0.1.22
        env:
          # Trust the checked-out workspace in headless CI — otherwise the Gemini
          # CLI refuses to run tools ("not running in a trusted directory").
          GEMINI_CLI_TRUST_WORKSPACE: "true"
        with:
          use_vertex_ai: true
          gcp_workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
          # Gemini v3 models are served from the "global" Vertex location (same as
          # the monitoring/triage agents) — us-central1 returns 404 model-not-found.
          gcp_location: global
          gemini_model: gemini-3.5-flash
          github_issue_number: ${{ github.event.issue.number }}
          # This is just a sample prompt that could be used here for demo purposes.
          prompt: |
            Read GEMINI.md / CLAUDE.md and the runbook referenced in grounding/.
            Find the root cause and implement the SMALLEST correct fix for the
            defect in this issue — change only what the ticket describes. Add or
            update a test that fails before the fix and passes after. Run the
            relevant checks (cargo test + clippy for Rust, pytest for Python).
            Edit files ONLY — do not run git, do not commit, and do not open a
            pull request. The workflow opens the PR from your changes.

      # --- Hard gate: the agent MUST open a PR from its changes ---
      - name: Normalize agent changes to the working tree
        # If the CLI committed (or branched), move those changes back to the
        # working tree so the PR step always sees them. No-op if it only edited.
        run: git reset --soft "${{ github.sha }}" || true

      - name: Open pull request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          base: main
          branch: agent-fix/issue-${{ github.event.issue.number }}
          delete-branch: true
          commit-message: "Coding agent: fix for #${{ github.event.issue.number }}"
          title: "Agent fix: ${{ github.event.issue.title }} (#${{ github.event.issue.number }})"
          body: |
            Autonomous fix from the coding agent for issue #${{ github.event.issue.number }}.

            Fixes #${{ github.event.issue.number }}

            The agent implemented the smallest fix plus a regression test.
            **Human review is the second gate — do not auto-merge.**

      - name: Enforce that a PR was opened
        if: ${{ steps.cpr.outputs.pull-request-number == '' }}
        run: |
          echo "::error::Coding agent produced no changes — no PR was opened."
          exit 1

      - name: Link the PR into the 3rd-line support console
        env:
          CONSOLE_URL: ${{ vars.CONSOLE_URL }}
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          if [ -z "$CONSOLE_URL" ]; then
            echo "::error::CONSOLE_URL variable not set — cannot surface the PR in the console."
            exit 1
          fi
          curl -sS --retry 3 --max-time 30 -X POST "$CONSOLE_URL/webhook/github" \
            -H "X-GitHub-Event: pull_request" \
            -H "content-type: application/json" \
            -d "{\"action\":\"opened\",\"pull_request\":{\"html_url\":\"$PR_URL\",\"body\":\"Fixes #$ISSUE\"}}"
